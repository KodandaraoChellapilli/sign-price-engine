services:
  - type: web
    name: sign-price-engine-backend
    env: python

    # 🔥 FORCE STABLE PYTHON VERSION
    runtime: python-3.10.13

    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r requirements.txt

    startCommand: uvicorn app:app --app-dir backend --host 0.0.0.0 --port 10000